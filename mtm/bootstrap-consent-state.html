<!-- 
  ════════════════════════════════════════════════════════════════
  MTM Custom HTML Tag: CMP - Bootstrap consent state
  ════════════════════════════════════════════════════════════════
  
  Trigger: Page View - All Pages
  
  Cel:
  - Sprawdza localStorage przy każdym ładowaniu strony
  - Jeśli consent udzielony → ładuje matomo.js natychmiast
  - Jeśli consent odrzucony → nic nie robi (brak trackingu)
  
  WAŻNE: Zmień Site ID na swoje rzeczywiste ID!
  ════════════════════════════════════════════════════════════════
-->

<script>
(function() {
  'use strict';
  
  // Sprawdź localStorage pod kątem zapisanej zgody
  var choice = null;
  var statsEnabled = false;
  
  try {
    choice = localStorage.getItem('matomoConsentChoice:v2');
  } catch (e) {}
  
  try {
    var stats = localStorage.getItem('matomoConsentStatsEnabled:v1');
    statsEnabled = (stats === '1' || stats === 'true');
  } catch (e) {}
  
  // Określ czy zgoda została udzielona
  var consentGranted = false;
  
  if (choice === 'accepted') {
    consentGranted = true;
  } else if (choice === 'custom' && statsEnabled) {
    consentGranted = true;
  }
  
  // Jeśli brak zgody → zakończ
  if (!consentGranted) {
    return;
  }
  
  // Sprawdź czy Matomo już nie jest załadowane (unikaj duplikacji)
  if (typeof Matomo !== 'undefined' && typeof Matomo.getAsyncTracker === 'function') {
    return;
  }
  
  // Zgoda udzielona → załaduj Matomo
  window._paq = window._paq || [];
  
  // Konfiguracja Matomo
  var u = "https://pi-ogp.coi.gov.pl/";
  _paq.push(['setTrackerUrl', u + 'matomo.php']);
  _paq.push(['setSiteId', '1']); // ← ZMIEŃ NA SWOJE SITE ID!
  
  // Normalne trackowanie z cookies (bez API consent)
  // NIE używaj requireCookieConsent lub setCookieConsentGiven
  
  // Załaduj matomo.js
  var d = document;
  var g = d.createElement('script');
  var s = d.getElementsByTagName('script')[0];
  g.async = true;
  g.src = u + 'matomo.js';
  
  g.onload = function() {
    // Po załadowaniu Matomo, wyślij pageview
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
  };
  
  s.parentNode.insertBefore(g, s);
})();
</script>
