<script>
(function() {
  'use strict';
  
  // Check localStorage for saved consent
  var choice = null;
  var statsEnabled = false;
  
  try {
    choice = localStorage.getItem('matomoConsentChoice:v2');
  } catch (e) {}
  
  try {
    var stats = localStorage.getItem('matomoConsentStatsEnabled:v1');
    statsEnabled = (stats === '1' || stats === 'true');
  } catch (e) {}
  
  // Determine if consent was granted
  var consentGranted = false;
  
  if (choice === 'accepted') {
    consentGranted = true;
  } else if (choice === 'custom' && statsEnabled) {
    consentGranted = true;
  }
  
  // If no consent → exit early
  if (!consentGranted) {
    return;
  }
  
  // Check if Matomo already loaded (avoid duplicate loading)
  if (typeof Matomo !== 'undefined' && typeof Matomo.getAsyncTracker === 'function') {
    return;
  }
  
  // Consent granted → load Matomo
  window._paq = window._paq || [];
  
  // Configure Matomo
  var u = "https://pi-ogp.coi.gov.pl/";
  _paq.push(['setTrackerUrl', u + 'matomo.php']);
  _paq.push(['setSiteId', '1']); // ← CHANGE THIS TO YOUR SITE ID!
  
  // Normal tracking with cookies (no consent API)
  // Do NOT use requireCookieConsent or setCookieConsentGiven
  
  // Load matomo.js
  var d = document;
  var g = d.createElement('script');
  var s = d.getElementsByTagName('script')[0];
  g.async = true;
  g.src = u + 'matomo.js';
  
  g.onload = function() {
    // After Matomo loads, track pageview
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
  };
  
  s.parentNode.insertBefore(g, s);
})();
</script>
