<!-- 
  ════════════════════════════════════════════════════════════════
  MTM Custom HTML Tag: Matomo - Apply consent mode
  ════════════════════════════════════════════════════════════════
  
  Triggery (użyj OBU):
    1. Custom Event - Consent Accept
       Type: Custom Event
       Event Name: cookie_accept
    
    2. Custom Event - Consent Partial Accept
       Type: Custom Event
       Event Name: cookie_partial
       Fire when: {{DLV - consent_statistics}} equals 1
  
  Cel:
  - Uruchamia się gdy użytkownik akceptuje consent (accept lub partial z stats=1)
  - Ładuje matomo.js dynamicznie
  - Wysyła trackPageView
  
  WAŻNE: Zmień Site ID na swoje rzeczywiste ID!
  ════════════════════════════════════════════════════════════════
-->

<script>
(function() {
  'use strict';
  
  // Ten tag odpala się tylko gdy consent udzielony (kontrolowane przez triggery)
  // Więc nie trzeba tu sprawdzać consent - tylko załadować Matomo
  
  // Sprawdź czy Matomo już nie jest załadowane (przez bootstrap tag)
  if (typeof Matomo !== 'undefined' && typeof Matomo.getAsyncTracker === 'function') {
    // Już załadowane, wyślij tylko pageview
    window._paq = window._paq || [];
    _paq.push(['trackPageView']);
    return;
  }
  
  // Zgoda udzielona → załaduj Matomo
  window._paq = window._paq || [];
  
  // Konfiguracja Matomo
  var u = "https://pi-ogp.coi.gov.pl/";
  _paq.push(['setTrackerUrl', u + 'matomo.php']);
  _paq.push(['setSiteId', '1']); // ← ZMIEŃ NA SWOJE SITE ID!
  
  // Normalne trackowanie z cookies (bez API consent)
  // NIE używaj requireCookieConsent lub setCookieConsentGiven
  
  // Załaduj matomo.js
  var d = document;
  var g = d.createElement('script');
  var s = d.getElementsByTagName('script')[0];
  g.async = true;
  g.src = u + 'matomo.js';
  
  g.onload = function() {
    // Po załadowaniu Matomo, wyślij pageview
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
  };
  
  s.parentNode.insertBefore(g, s);
})();
</script>
